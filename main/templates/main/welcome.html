<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>欢迎使用</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b1220;
      --card: rgba(255, 255, 255, 0.08);
      --border: rgba(255, 255, 255, 0.16);
      --text: rgba(255, 255, 255, 0.92);
      --muted: rgba(255, 255, 255, 0.70);
      --accent: #66d9ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(1200px 600px at 10% 10%, rgba(102, 217, 255, 0.25), transparent 55%),
        radial-gradient(900px 500px at 90% 30%, rgba(125, 255, 168, 0.18), transparent 55%),
        radial-gradient(900px 700px at 50% 90%, rgba(164, 119, 255, 0.18), transparent 60%),
        var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans SC",
        "Microsoft YaHei", sans-serif;
    }
    .shell {
      width: min(980px, calc(100% - 32px));
      padding: 22px;
      border-radius: 18px;
      background: var(--card);
      border: 1px solid var(--border);
      backdrop-filter: blur(10px);
      box-shadow: 0 18px 60px rgba(0, 0, 0, 0.45);
    }
    h1 {
      margin: 2px 0 0;
      font-size: clamp(22px, 3vw, 34px);
      line-height: 1.2;
    }
    .cta {
      margin-top: 0;
      display: block;
      align-items: center;
      padding: 26px 22px;
      border-radius: 18px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      text-decoration: none;
      font-weight: 700;
      transition: transform 0.15s ease, background 0.2s ease, border-color 0.2s ease;
      user-select: none;
      text-align: center;
    }
    .cta:hover {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, 0.10);
      border-color: rgba(102, 217, 255, 0.40);
    }
    .cta:active { transform: translateY(0); }
    .arrow { opacity: 0.9; }
    .title-row {
      display: flex;
      align-items: baseline;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .enter {
      margin: 14px auto 0;
      display: inline-flex;
      gap: 10px;
      align-items: center;
      justify-content: center;
      padding: 10px 14px;
      border-radius: 12px;
      border: 1px solid rgba(102, 217, 255, 0.35);
      background: rgba(102, 217, 255, 0.10);
      font-weight: 800;
    }
  </style>
</head>
<body>
  <main class="shell">
    <a class="cta" href="{% url 'dashboard' %}">
      <div class="title-row">
        <h1>欢迎使用“基于多模态感知的国民体质评估与健康演化系统”</h1>
      </div>
      <div class="enter">
        点击进入
        <span class="arrow">→</span>
      </div>
    </a>
  </main>
</body>
</html>
